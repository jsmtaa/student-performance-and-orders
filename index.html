<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Final Term Project</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="p-4">

<div class="container">

  <h2 class="mb-3">Students</h2>
  <table class="table table-bordered table-striped" id="student-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Average Grade</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2 class="mb-3">Orders</h2>
  <table class="table table-bordered table-striped" id="order-table">
    <thead>
      <tr>
        <th>Customer</th>
        <th>Order Total</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <p id="grand-total" class="fw-bold"></p>

  <h2 class="mb-3">Search Student</h2>
  <div class="mb-3">
    <input type="text" class="form-control" id="search-name" placeholder="Enter student name">
    <button class="btn btn-primary mt-2" id="search-btn">Search</button>
  </div>
  <ul class="list-group mb-3" id="search-result"></ul>

  <h2>JSON Summary</h2>
  <pre id="summary-json"></pre>

</div>

<script>
  const data = {
    students: [
      {
        id: 1,
        name: "Alice",
        course: { code: "BSIT", name: "Bachelor of Science in IT" },
        subjects: [
          { name: "Math", grade: 90 },
          { name: "Science", grade: 85 },
          { name: "Programming", grade: 92 }
        ]
      },
      {
        id: 2,
        name: "Bob",
        course: { code: "BSIT", name: "Bachelor of Science in IT" },
        subjects: [
          { name: "Math", grade: 78 },
          { name: "Science", grade: 88 },
          { name: "Programming", grade: 80 }
        ]
      },
      {
        id: 3,
        name: "Charlie",
        course: { code: "BSCS", name: "Bachelor of Science in CS" },
        subjects: [
          { name: "Math", grade: 95 },
          { name: "Science", grade: 91 },
          { name: "Programming", grade: 94 }
        ]
      },
      {
        id: 4,
        name: "Diana",
        course: { code: "BSCS", name: "Bachelor of Science in CS" },
        subjects: [
          { name: "Math", grade: 85 },
          { name: "Science", grade: 87 },
          { name: "Programming", grade: 89 }
        ]
      },
      {
        id: 5,
        name: "Ethan",
        course: { code: "BSIS", name: "Bachelor of Science in IS" },
        subjects: [
          { name: "Math", grade: 70 },
          { name: "Science", grade: 75 },
          { name: "Programming", grade: 72 }
        ]
      }
    ],
    orders: [
      {
        customer: "Alice",
        orders: [
          { order_id: 1, product: "Mouse", category: "Accessories", price: 500, quantity: 2 },
          { order_id: 6, product: "Headset", category: "Accessories", price: 1200, quantity: 1 }
        ]
      },
      {
        customer: "Bob",
        orders: [{ order_id: 2, product: "Keyboard", category: "Accessories", price: 1500, quantity: 1 }]
      },
      {
        customer: "Charlie",
        orders: [{ order_id: 3, product: "Monitor", category: "Hardware", price: 7000, quantity: 2 }]
      },
      {
        customer: "Diana",
        orders: [{ order_id: 4, product: "Laptop", category: "Hardware", price: 45000, quantity: 1 }]
      },
      {
        customer: "Ethan",
        orders: [{ order_id: 5, product: "USB Cable", category: "Accessories", price: 200, quantity: 3 }]
      }
    ]
  };

  // PROCESSING
  const studentTableBody = $("#student-table tbody");
  let studentAverages = [];

  data.students.forEach(student => {
    let total = 0;
    student.subjects.forEach(sub => {
      if (typeof sub.grade !== "number" || sub.grade < 0 || sub.grade > 100) {
        console.error(`Invalid grade for ${student.name}, subject ${sub.name}`);
      }
      total += sub.grade;
    });
    let avg = total / student.subjects.length;
    studentAverages.push({ name: student.name, average: avg });

    studentTableBody.append(`<tr>
      <td>${student.name}</td>
      <td>${student.course.name}</td>
      <td>${avg.toFixed(2)}</td>
    </tr>`);
  });

  // TOP STUDENT
  const topStudent = studentAverages.reduce((top, curr) => curr.average > top.average ? curr : top, studentAverages[0]);
  console.log("Top Student:", topStudent.name, topStudent.average.toFixed(2));

  // ORDERS
  const orderTableBody = $("#order-table tbody");
  let grandTotal = 0;

  data.orders.forEach(cust => {
    let custTotal = 0;
    cust.orders.forEach(ord => {
      if (typeof ord.price !== "number" || typeof ord.quantity !== "number") {
        console.error(`Invalid order for ${cust.customer}`);
      }
      custTotal += ord.price * ord.quantity;
    });
    grandTotal += custTotal;

    orderTableBody.append(`<tr>
      <td>${cust.customer}</td>
      <td>₱${custTotal}</td>
    </tr>`);
  });

  $("#grand-total").text(`Grand Total: ₱${grandTotal}`);

  // SEARCH
  $("#search-btn").click(() => {
    const searchName = $("#search-name").val().toLowerCase();
    const resultEl = $("#search-result").empty();

    const student = data.students.find(s => s.name.toLowerCase() === searchName);
    if (student) {
      student.subjects.forEach(sub => {
        resultEl.append(`<li class="list-group-item">${sub.name}: ${sub.grade}</li>`);
      });
    } else {
      resultEl.append(`<li class="list-group-item">Student not found</li>`);
    }
  });

  // JSON Output Transformation
  const summaryJSON = {
    studentAverages,
    grandTotal
  };
  $("#summary-json").text(JSON.stringify(summaryJSON, null, 2));

</script>

</body>
</html>
